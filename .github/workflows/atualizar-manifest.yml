name: Atualizar manifest.json

# "on" define quando esse robô deve rodar.
# - published: quando alguém publica um Release NOVO.
# - edited: quando alguém edita um Release que já existia.
# - workflow_dispatch: adiciona um botão "Run workflow" na aba Actions,
#   pra você poder rodar o robô manualmente a qualquer momento, sem
#   precisar mexer em Release nenhuma. Útil pra testar.
on:
  release:
    types: [published, edited]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag da Release a usar (ex: v1.0.0) — só é usada quando você roda manualmente'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  gerar-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Gerar manifest.json a partir dos arquivos do Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Se o robô rodou por causa de uma Release (publicada/editada), usa
          # a tag dessa Release. Se foi você que clicou em "Run workflow" à
          # mão, usa a tag que você digitou na caixinha.
          RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.release_tag }}
        run: |
          echo "Usando a Release: $RELEASE_TAG"
          # Guarda o valor pra ele continuar disponível no próximo step também.
          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"

          gh release view "$RELEASE_TAG" --json assets \
            --jq '{
              version: "'"$RELEASE_TAG"'",
              mods: [.assets[] | select(.name | endswith(".jar")) | {arquivo: .name, url: .url}]
            }' > manifest.json

          echo "Conteúdo gerado:"
          cat manifest.json

      - name: Salvar o manifest.json atualizado no repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git diff --cached --quiet || git commit -m "Atualizar manifest.json (Release: $RELEASE_TAG)"
          git push
