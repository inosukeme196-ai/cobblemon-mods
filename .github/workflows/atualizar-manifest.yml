name: Atualizar manifest.json

# "on" define quando esse robô deve rodar sozinho.
# - published: quando alguém publica um Release NOVO.
# - edited: quando alguém edita um Release que já existia
#   (por exemplo, adiciona ou remove um arquivo .jar dele).
# Com os dois aqui, não importa se você cria um Release novo ou edita um
# antigo — o robô roda do mesmo jeito e gera o manifest.json atualizado.
on:
  release:
    types: [published, edited]

permissions:
  contents: write

jobs:
  gerar-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Gerar manifest.json a partir dos arquivos do Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          # Pergunta pro GitHub quais arquivos (.jar) estão dentro desse Release.
          # "jq" é usado pra ler a resposta (que vem em formato JSON) e montar
          # o manifest.json do jeito que o launcher espera.
          gh release view "$RELEASE_TAG" --json assets \
            --jq '{
              version: "'"$RELEASE_TAG"'",
              mods: [.assets[] | select(.name | endswith(".jar")) | {arquivo: .name, url: .url}]
            }' > manifest.json

          echo "Conteúdo gerado:"
          cat manifest.json

      - name: Salvar o manifest.json atualizado no repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          # Só faz o commit se algo realmente mudou, pra não gerar commits vazios.
          git diff --cached --quiet || git commit -m "Atualizar manifest.json (Release: ${{ github.event.release.tag_name }})"
          git push
